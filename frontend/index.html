<!doctype html>
<html lang="pt" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph (preenchido em produção) -->
    <meta property="og:title" content="grain — no noise, only grain" />
    <meta property="og:description" content="Trusted news sources, AI summaries on demand, semantic topic follow. No algorithm, no ads." />
    <meta name="description" content="Trusted news sources, AI summaries on demand, semantic topic follow. No algorithm, no ads." />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>grain</title>

    <!-- GitHub Pages SPA routing: restore path from ?p= redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= from 404.html
        var search = window.location.search;
        if (search.slice(1, 3) === 'p=') {
          var decoded = search.slice(1).split('&').reduce(function(a, b) {
            if (b.slice(0, 2) === 'p=') a.pathname = '/' + b.slice(2).replace(/~and~/g, '&');
            if (b.slice(0, 2) === 'q=') a.search = '?' + b.slice(2).replace(/~and~/g, '&');
            return a;
          }, { pathname: '', search: '' });
          history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') +
            decoded.pathname + decoded.search + window.location.hash
          );
        }
      }());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
