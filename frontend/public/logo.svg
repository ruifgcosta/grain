<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo creme com cantos arredondados — versão ícone -->
  <rect width="100" height="100" rx="22" fill="#EDE8DC"/>

  <!-- Dot central — grande, preto -->
  <circle cx="50" cy="50" r="12" fill="#111111"/>

  <!-- 8 dots à volta — raio 22 do centro, posições horárias -->

  <!-- 12h — top (cardinal — claro) -->
  <circle cx="50"    cy="28"    r="5.8"  fill="#888888"/>
  <!-- 1:30h — top-right (diagonal — ainda mais claro) -->
  <circle cx="65.6"  cy="34.4"  r="3.8"  fill="#c4c4c4"/>
  <!-- 3h — right (cardinal — claro) -->
  <circle cx="72"    cy="50"    r="5.8"  fill="#888888"/>
  <!-- 4:30h — bottom-right (diagonal — ainda mais claro) -->
  <circle cx="65.6"  cy="65.6"  r="3.8"  fill="#c4c4c4"/>
  <!-- 6h — bottom (cardinal — claro) -->
  <circle cx="50"    cy="72"    r="5.8"  fill="#888888"/>
  <!-- 7:30h — bottom-left (diagonal — ainda mais claro) -->
  <circle cx="34.4"  cy="65.6"  r="3.8"  fill="#c4c4c4"/>
  <!-- 9h — left (cardinal — claro) -->
  <circle cx="28"    cy="50"    r="5.8"  fill="#888888"/>
  <!-- 10:30h — top-left (diagonal — ainda mais claro) -->
  <circle cx="34.4"  cy="34.4"  r="3.8"  fill="#c4c4c4"/>
</svg>
